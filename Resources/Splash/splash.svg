<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     xml:space="preserve"
     style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">

  <defs>
    <!-- Gold gradient — upper eyelid -->
    <linearGradient id="goldLid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C8860A"/>
      <stop offset="40%"  stop-color="#F5B730"/>
      <stop offset="100%" stop-color="#E8A020"/>
    </linearGradient>

    <!-- Blue gradient — lower eyelid -->
    <linearGradient id="blueLid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2E7FC0"/>
      <stop offset="50%"  stop-color="#5BB4E8"/>
      <stop offset="100%" stop-color="#3A90CC"/>
    </linearGradient>

    <!-- Iris radial fill -->
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#B8E0F7"/>
      <stop offset="60%"  stop-color="#7EC8F0"/>
      <stop offset="100%" stop-color="#4A9EC8"/>
    </radialGradient>

    <!-- Pupil depth gradient -->
    <radialGradient id="pupilGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#2A3A5C"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
  </defs>

  <!-- ── Background — white ── -->
  <rect width="456" height="456" fill="#ffffff"/>

  <!-- ══════════════════════════════════════════════
       Eye icon — centered at (228, 195), scaled to fit
       Original coords were 0–500 center 250,250
       Translate: tx = 228-250 = -22, ty = 195-250 = -55
       Scale: ~0.78 to fit nicely
  ═══════════════════════════════════════════════ -->
  <g transform="translate(228,195) scale(0.78) translate(-250,-250)">

    <!-- White of eye -->
    <path d="M250,158 C185,158 108,200 65,250 C108,300 185,342 250,342 C315,342 392,300 435,250 C392,200 315,158 250,158 Z"
          fill="white"/>

    <!-- Upper eyelid arc (gold) -->
    <path d="M60,250 C100,200 180,143 250,146 C320,143 400,200 440,250"
          fill="none" stroke="url(#goldLid)" stroke-width="22" stroke-linecap="round"/>

    <!-- Lower eyelid arc (blue) -->
    <path d="M60,250 C100,300 180,354 250,354 C320,354 400,300 440,250"
          fill="none" stroke="url(#blueLid)" stroke-width="18" stroke-linecap="round"/>

    <!-- Iris base -->
    <circle cx="250" cy="250" r="82" fill="url(#irisGrad)"/>

    <!-- Iris radiating spokes -->
    <g stroke="#5AAEDD" stroke-width="1.5" opacity="0.75">
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(0,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(15,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(30,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(45,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(60,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(75,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(90,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(105,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(120,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(135,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(150,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(165,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(180,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(195,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(210,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(225,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(240,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(255,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(270,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(285,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(300,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(315,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(330,250,250)"/>
      <line x1="250" y1="172" x2="250" y2="156" transform="rotate(345,250,250)"/>
    </g>

    <!-- Iris outer ring -->
    <circle cx="250" cy="250" r="82" fill="none" stroke="#1E5A8A" stroke-width="5"/>

    <!-- Pupil -->
    <circle cx="250" cy="250" r="46" fill="url(#pupilGrad)"/>
    <circle cx="250" cy="250" r="38" fill="#0D1525" opacity="0.7"/>

    <!-- White highlight reflection -->
    <circle cx="268" cy="232" r="13" fill="white" opacity="0.9"/>
    <circle cx="261" cy="228" r="7"  fill="white"/>

    <!-- 4-point sparkle star -->
    <g transform="translate(295,215)" fill="white">
      <polygon points="0,-12 2.5,-2.5 12,0 2.5,2.5 0,12 -2.5,2.5 -12,0 -2.5,-2.5" opacity="0.95"/>
      <circle cx="14" cy="-8" r="3" opacity="0.7"/>
    </g>

  </g>

  <!-- ══════════════════════════════════════════════
       "UL OPTOMETRY" wordmark below the eye
       UL in gold, OPTOMETRY in white
  ═══════════════════════════════════════════════ -->
  <text x="228" y="338"
		  font-family="Georgia, 'Times New Roman', serif"
		  font-size="38"
		  font-weight="700"
		  text-anchor="middle"
		  letter-spacing="3">
    <tspan fill="#F5B730">UL</tspan><tspan fill="#1E3A8A"> OPTOMETRY</tspan>
  </text>

  <!-- Thin gold rule under wordmark -->
  <line x1="118" y1="352" x2="338" y2="352"
		  stroke="#1E3A8A" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Subtitle -->
  <text x="228" y="376"
			font-family="Georgia, 'Times New Roman', serif"
			font-size="13"
			font-weight="400"
			text-anchor="middle"
			fill="#1E3A8A"
			opacity="0.55"
			letter-spacing="2">
    CLINICAL MANAGEMENT SYSTEM
  </text>


</svg>
